<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aristotus College — Contact</title>
  <meta name="description" content="Contact Aristotus College.">
  <style>
/* ===== Aristotus College — base styles ===== */
:root {
  --navy: #1c2b4a;
  --navy-dark: #14213a;
  --accent: #c9a24b;
  --bg: #ffffff;
  --bg-alt: #f5f6f8;
  --text: #283142;
  --muted: #5d6678;
  --border: #e3e6ec;
  --maxw: 1080px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: Georgia, "Times New Roman", serif;
  color: var(--text);
  line-height: 1.65;
  background: var(--bg);
}

a { color: var(--navy); text-decoration: none; }
a:hover { color: var(--accent); }

img { max-width: 100%; display: block; }

.container { max-width: var(--maxw); margin: 0 auto; padding: 0 1.25rem; }

/* ===== Header / Nav ===== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--navy);
  color: #fff;
}
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1.25rem;
  max-width: var(--maxw);
  margin: 0 auto;
}
.brand {
  font-size: 1.35rem;
  font-weight: bold;
  color: #fff;
  letter-spacing: 0.5px;
}
.brand span { color: var(--accent); }
.nav-toggle {
  display: none;
  background: none;
  border: 0;
  color: #fff;
  font-size: 1.6rem;
  cursor: pointer;
}
.nav-links {
  display: flex;
  gap: 1.75rem;
  list-style: none;
}
.nav-links a {
  color: #e8eaf0;
  font-size: 1rem;
  padding: 0.25rem 0;
  border-bottom: 2px solid transparent;
}
.nav-links a:hover,
.nav-links a.active {
  color: #fff;
  border-bottom-color: var(--accent);
}

/* ===== Hero ===== */
.hero {
  background: linear-gradient(rgba(20,33,58,0.78), rgba(20,33,58,0.78)),
              url("images/hero.jpg") center/cover no-repeat, var(--navy-dark);
  color: #fff;
  text-align: center;
  padding: 6rem 1.25rem;
}
.hero h1 { font-size: 2.6rem; margin-bottom: 1rem; }
.hero p { font-size: 1.2rem; max-width: 620px; margin: 0 auto 2rem; color: #dfe3ec; }

.btn {
  display: inline-block;
  background: var(--accent);
  color: var(--navy-dark);
  font-weight: bold;
  padding: 0.8rem 1.8rem;
  border-radius: 4px;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; color: var(--navy-dark); }

/* ===== Sections ===== */
.section { padding: 4rem 0; }
.section.alt { background: var(--bg-alt); }
.section h2 {
  font-size: 2rem;
  color: var(--navy);
  margin-bottom: 1.5rem;
  text-align: center;
}
.lead { font-size: 1.1rem; color: var(--muted); max-width: 720px; margin: 0 auto 2rem; text-align: center; }

.page-title {
  background: var(--navy-dark);
  color: #fff;
  text-align: center;
  padding: 3.5rem 1.25rem;
}
.page-title h1 { font-size: 2.3rem; }

/* ===== Cards / grid ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem;
  margin-top: 2rem;
}
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.75rem;
}
.card h3 { color: var(--navy); margin-bottom: 0.6rem; font-size: 1.25rem; }
.card p { color: var(--muted); }

/* ===== Contact form ===== */
.form { max-width: 560px; margin: 2rem auto 0; }
.form label { display: block; margin-bottom: 0.35rem; font-weight: bold; color: var(--navy); }
.form input,
.form textarea {
  width: 100%;
  padding: 0.7rem;
  margin-bottom: 1.2rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: inherit;
  font-size: 1rem;
}
.form textarea { min-height: 140px; resize: vertical; }

.contact-info { text-align: center; margin-top: 1rem; color: var(--muted); }
.contact-info strong { color: var(--navy); }

/* ===== Footer ===== */
.site-footer {
  background: var(--navy-dark);
  color: #c7cdda;
  text-align: center;
  padding: 2rem 1.25rem;
  font-size: 0.9rem;
}
.site-footer a { color: var(--accent); }

/* ===== Responsive ===== */
@media (max-width: 760px) {
  .nav-toggle { display: block; }
  .nav-links {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    flex-direction: column;
    gap: 0;
    background: var(--navy);
    padding: 0.5rem 1.25rem 1rem;
  }
  .nav-links.open { display: flex; }
  .nav-links a { padding: 0.7rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .hero h1 { font-size: 2rem; }
}

  </style>
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html">Aristotus<span>.</span></a>
      <button class="nav-toggle" aria-label="Menu" onclick="document.getElementById('menu').classList.toggle('open')">&#9776;</button>
      <ul class="nav-links" id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="programmes.html">Programmes</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="page-title">
    <h1>Contact Us</h1>
  </section>

  <section class="section">
    <div class="container">
      <p class="lead">Replace the email and phone below with your real details.</p>

      <!--
        NOTE: GitHub Pages is static and cannot process form submissions on its own.
        To make this form actually send email, sign up free at https://formspree.io,
        create a form, and paste your form endpoint into the action="" below.
        Until then the form will not send anything.
      -->
      <form class="form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button class="btn" type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <p><strong>Contact:</strong> Us</p>
        <p><strong>Email:</strong><a href="mailto:Aristotus.College.SG@gmail.com">Aristotus.College.SG@gmail.com</a></p>
        <p><strong>Phone:</strong> +61 400 191 400</p>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <p>&copy; 2025 Aristotus College. All Rights Reserved. &nbsp;|&nbsp; <a href="contact.html">Get in touch</a></p>
  </footer>

</body>
</html>
